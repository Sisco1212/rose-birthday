<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Rose 🌹</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family: 'Segoe UI', sans-serif;
overflow-x:hidden;
text-align:center;
}

.container{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
}

/* TEXT ANIMATION */

.reveal{
font-size:2.5rem;
overflow:hidden;
white-space:nowrap;
border-right:3px solid transparent;
width:0;
animation:reveal 2s forwards;
}

.reveal#birthday {
font-size: 2rem;
}

@keyframes reveal{
from{width:0}
to{width:100%}
}

.fadeout{
animation:fadeout 1s forwards;
}

@keyframes fadeout{
to{opacity:0}
}

/* LOVE TEXT */

.love{
position:absolute;
bottom:50px;
font-weight:bold;
display:flex;
gap:20px;
font-size:3rem;
}

.love span{
opacity:0;
}

.smallI{
/*font-size:2rem;*/
align-self:flex-end;
}

/* MEMORY PHOTOS */

.memories{
position:absolute;
top:0;
left:0;
width:100%;
height:90%;
pointer-events:none;
}

/*.memory{
position:absolute;
width:80px;
border-radius:15px;
border:4px solid white;
opacity:0;
} */

.memory{
position:absolute;
width:80px;
border-radius:15px;
border:4px solid white;
opacity:0;
transform:scale(0.8);
transition:opacity 1s, transform 1s;
}

@keyframes fadeIn{
to {
opacity: 1;
}
     
}

/*.top1{top:50px; left:15%;
     animation:fadeIn 2s 2s;
      
     }
.top2{top:50px; right:15%;
     animation:fadeIn 2s 4s;
      
     }
.bottom1{bottom:80px; left:20%;
        animation:fadeIn 2s 6s;
         
        }
.bottom2{bottom:80px; right:20%;
        animation:fadeIn 2s 8s;
         
        }*/


.top1{top:50px; left:15%;}
.top2{top:50px; right:15%;}
.bottom1{bottom:80px; left:20%;}
.bottom2{bottom:80px; right:20%;}

/* FINAL SECTION */

.final{
display:none;
flex-direction:column;
align-items:center;
margin-top:30px;
}

.final h2 {
font-size: 2.5rem;
text-shadow:0 0 4px rgba(0,0,0,0.2);
}

.final p {
font-size: 1rem;
}

.final img{
width:200px;
margin-top:20px;
}

audio{
margin-top:15px;
}

     #roseParticles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}

.container{
position:relative;
z-index:2;
}

</style>
</head>

<body>
     <canvas id="roseParticles"></canvas>

<div class="container">

<h1 id="rose" class="reveal">My Rose.🌹</h1>

<h1 id="birthday" class="reveal" style="display:none;">
Happy birthday to you.
</h1>

<div class="love" id="love">
<span class="smallI" id="i">I</span>
<span id="loveWord">LOVE</span>
<span id="youWord">YOU</span>
</div>

<div class="memories">

<img src="IMG-20250713-WA0006.jpg" class="memory top1">
<img src="IMG-20250720-WA0000.jpg" class="memory top2">
<img src="IMG-20250720-WA0002.jpg" class="memory bottom1">
<img src="IMG-20250817-WA0016.jpg" class="memory bottom2">

</div>

<div class="final" id="final">

<h2>Enjoy your day ❤️</h2>

<img src="birthday.gif">

<p>HI! Please click this 👇🏾</p>

<audio controls>
<source src="voice.mp3" type="audio/mpeg">
</audio>

</div>

</div>

<script>

const canvas = document.getElementById("roseParticles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*3+1,
speedY:Math.random()*0.5+0.2,
speedX:(Math.random()-0.5)*0.3,
opacity:Math.random()
});
}

function animateParticles(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.y -= p.speedY;
p.x += p.speedX;

if(p.y < 0){
p.y = canvas.height;
p.x = Math.random()*canvas.width;
}

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle = "rgba(255,120,150,"+p.opacity+")";
ctx.fill();
});

requestAnimationFrame(animateParticles);
}

animateParticles();

// stage 1
setTimeout(()=>{
document.getElementById("rose").classList.add("fadeout")
},3000)
     
setTimeout(()=>{
document.getElementById("roseParticles").style.transition="opacity 2s"
document.getElementById("roseParticles").style.opacity="0"
},14000)

// stage 2
setTimeout(()=>{
document.getElementById("rose").style.display="none"
document.getElementById("birthday").style.display="block"
},4000)

setTimeout(()=>{
document.getElementById("birthday").classList.add("fadeout")
document.getElementById("birthday").style.display="none"
     
},13500)

// show memories
//setTimeout(()=>{
//document.querySelectorAll(".memory").forEach(m=>{
//m.style.opacity=1
//})
//},5000)

const memories = document.querySelectorAll(".memory")

// first image
setTimeout(()=>{
memories[0].style.opacity = 1
memories[0].style.transform = "scale(1)"},5000)

// second image (2 sec later)
setTimeout(()=>{
memories[1].style.opacity = 1
memories[1].style.transform = "scale(1)"},6000)

// third image
setTimeout(()=>{
memories[2].style.opacity = 1
memories[2].style.transform = "scale(1)"},7000)

// fourth image
setTimeout(()=>{
memories[3].style.opacity = 1
memories[3].style.transform = "scale(1)"
},8000)

// fade them out before background transition
setTimeout(()=>{
memories.forEach(m=>{
m.style.opacity = 0
})
},13000)

// I
setTimeout(()=>{
document.getElementById("i").style.opacity=1
},9000)

// LOVE
setTimeout(()=>{
document.getElementById("loveWord").style.opacity=1
},10000)

// YOU
setTimeout(()=>{
document.getElementById("youWord").style.opacity=1
},11500)

// background transition
setTimeout(()=>{

document.body.style.transition="background 2s"

document.body.style.background="purple"

setTimeout(()=>{document.body.style.background="pink"},900)

setTimeout(()=>{document.body.style.background="#C9C46B"},1300)

},14000)

// show final message
setTimeout(()=>{
document.getElementById("final").style.display="flex"
},16000)

</script>

</body>
</html>
